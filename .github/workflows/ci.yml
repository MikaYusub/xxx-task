name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  javascript:
    name: JavaScript build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  inference:
    name: Inference server tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: services/inference-server
        run: python -m pip install -r requirements.txt

      - name: Test
        working-directory: services/inference-server
        run: python -m pytest
