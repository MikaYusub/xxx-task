services:
  firebase:
    build:
      context: .
      dockerfile: docker/firebase/Dockerfile
    command: sh -c "npm install && npm run build --workspaces --if-present && npx firebase emulators:start --project demo-local --only auth,firestore,functions,pubsub"
    depends_on:
      config-service:
        condition: service_started
      inference-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
    ports:
      - "4000:4000"
      - "5001:5001"
      - "8080:8080"
      - "8085:8085"
      - "9099:9099"
    volumes:
      - .:/workspace
      - firebase_node_modules:/workspace/node_modules
    working_dir: /workspace

  config-service:
    build:
      context: services/config-service
    env_file:
      - .env
    environment:
      ENABLE_LOCAL_ENDPOINTS: "true"
    ports:
      - "3000:3000"

  inference-server:
    build:
      context: services/inference-server
    env_file:
      - .env
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8080
      GOOGLE_CLOUD_PROJECT: demo-local
      INFERENCE_MODE: fake
      ENABLE_LOCAL_ENDPOINTS: "true"
      OUTPUT_DIR: /app/outputs
      LORA_CACHE_DIR: /app/cache/lora
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 60
      start_period: 10s
    volumes:
      - ./outputs:/app/outputs
      - ./cache:/app/cache
      - ./cache/huggingface:/root/.cache/huggingface

  publisher:
    image: node:20-bookworm
    profiles:
      - tools
    env_file:
      - .env
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8080
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
    volumes:
      - .:/workspace
      - publisher_node_modules:/workspace/node_modules
    working_dir: /workspace

volumes:
  firebase_node_modules:
  publisher_node_modules:
